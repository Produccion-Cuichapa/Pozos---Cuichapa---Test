name: Check-in Recorredores — Alerta 2 horas

on:
  schedule:
    # Cada 30 minutos de 14:00 a 22:00 UTC (8am-4pm hora México CDT UTC-6)
    - cron: '0,30 14-22 * * 1-5'
  workflow_dispatch: # Permite correrlo manualmente desde GitHub

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar check-in de recorredores
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          UM_TOKEN: ${{ secrets.UM_TOKEN }}
          UM_INSTANCE: ${{ secrets.UM_INSTANCE }}
        run: |
          node << 'SCRIPT'
          const https = require('https');

          const FB_URL   = process.env.FIREBASE_DB_URL;
          const UM_TOKEN = process.env.UM_TOKEN;
          const UM_INST  = process.env.UM_INSTANCE;
          const WA_TO    = '522293735876';
          const RECORREDORES = ['Manrique', 'Cirilo', 'Juan Carlos'];
          const LIMITE_MS    = 2 * 60 * 60 * 1000; // 2 horas

          // Hora México (CDT = UTC-6 en verano)
          const ahoraUTC  = new Date();
          const ahoraMX   = new Date(ahoraUTC.getTime() - 6 * 60 * 60 * 1000);
          const horaMX    = ahoraMX.getHours();
          const minMX     = ahoraMX.getMinutes();
          const horaStr   = ahoraMX.toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit'});

          // Solo operar en horario laboral 8:00 - 16:00
          if(horaMX < 8 || horaMX >= 16){
            console.log(`Fuera de horario laboral: ${horaMX}:${minMX < 10 ? '0'+minMX : minMX} hora México`);
            process.exit(0);
          }
          console.log(`Revisando check-in a las ${horaStr} hora México`);

          // Función: hacer GET a Firebase REST API
          function firebaseGet(path){
            return new Promise((resolve, reject) => {
              const url = `${FB_URL}/${path}.json`;
              https.get(url, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { resolve(null); }
                });
              }).on('error', reject);
            });
          }

          // Función: enviar WhatsApp via Ultramsg
          function enviarWA(msg){
            return new Promise((resolve, reject) => {
              const body = `token=${encodeURIComponent(UM_TOKEN)}&to=${encodeURIComponent(WA_TO)}&body=${encodeURIComponent(msg)}`;
              const opts = {
                hostname: 'api.ultramsg.com',
                path: `/${UM_INST}/messages/chat`,
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Content-Length': Buffer.byteLength(body) }
              };
              const req = https.request(opts, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => { console.log('WA respuesta:', d); resolve(d); });
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          // Obtener todos los reportes de Firebase
          async function main(){
            const reportes = await firebaseGet('reportes');
            if(!reportes){
              console.log('No hay reportes en Firebase todavía');
              process.exit(0);
            }

            const arr = Object.values(reportes);
            const ahora = Date.now();
            const alertas = [];

            for(const rec of RECORREDORES){
              // Filtrar reportes de este recorredor
              const propios = arr.filter(r => r.recorredor === rec && !r.esAlarma);
              if(!propios.length){
                // Nunca ha reportado hoy — no alertar (puede que no esté en turno)
                console.log(`${rec}: sin reportes registrados`);
                continue;
              }

              // Encontrar el más reciente
              const ultimo = propios.reduce((a, b) => 
                new Date(a.fecha) > new Date(b.fecha) ? a : b
              );

              const diffMs  = ahora - new Date(ultimo.fecha).getTime();
              const diffMin = Math.round(diffMs / 60000);
              const diffHrs = (diffMs / LIMITE_MS).toFixed(1);

              console.log(`${rec}: último reporte hace ${diffMin} min (${diffHrs} de 2 hrs)`);

              if(diffMs >= LIMITE_MS){
                alertas.push({ rec, diffMin, pozo: ultimo.pozo || '?' });
              }
            }

            if(alertas.length === 0){
              console.log('✅ Todos los recorredores al día');
              process.exit(0);
            }

            // Enviar alerta por cada recorredor sin reporte
            for(const a of alertas){
              const hrs  = Math.floor(a.diffMin / 60);
              const mins = a.diffMin % 60;
              const msg = 
                `⚠️ *ALERTA DE CHECK-IN — CAMPO CUICHAPA*\n` +
                `━━━━━━━━━━━━━━━━━━\n` +
                `👷 *${a.rec}* no ha enviado reporte en ${hrs > 0 ? hrs+'h ' : ''}${mins}min\n` +
                `📍 Último pozo registrado: C-${a.pozo}\n` +
                `🕐 Hora actual: ${horaStr}\n` +
                `━━━━━━━━━━━━━━━━━━\n` +
                `_Verificar estado del recorredor_`;

              console.log(`🚨 Enviando alerta para ${a.rec}...`);
              await enviarWA(msg);
              // Pausa entre mensajes
              await new Promise(r => setTimeout(r, 2000));
            }

            console.log(`🚨 ${alertas.length} alerta(s) enviadas`);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          SCRIPT
